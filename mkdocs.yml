site_name: LLMWire
site_description: Lightweight multi-provider LLM client for Python
site_url: https://alexmar07.github.io/llmwire
repo_url: https://github.com/alexmar07/llmwire
repo_name: alexmar07/llmwire

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - API Reference: api-reference.md
